<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Drew Waters Music</title>
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #000;
      color: #d8d8d8;
      text-transform: lowercase;
    }

    #dw-app {
      min-height: 100vh;
      width: 100vw;
      padding: 22px;
      padding-bottom: 190px;
      box-sizing: border-box;
    }

    .dw-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
      color: #f2f2f2;
      letter-spacing: 0.02em;
    }

    .dw-subtitle {
      color: #777;
      font-size: 12px;
      margin-bottom: 18px;
    }

    .dw-search {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 24px;
      padding: 11px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: #ddd;
      font-size: 12px;
      outline: none;
      text-transform: lowercase;
    }

    .dw-search::placeholder {
      color: #555;
    }

    .dw-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    .dw-album-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dw-album-card {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      cursor: pointer;
      transition: background .18s ease, transform .18s ease, border-color .18s ease;
    }

    .dw-album-card:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }

    .dw-album-card.active {
      background: rgba(255,255,255,.08);
    }

    .dw-album-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 8px;
      background: #111;
    }

    .dw-cover-placeholder {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      background: linear-gradient(145deg,#111,#1a1a1a);
    }

    .dw-album-title {
      font-size: 12px;
      font-weight: 400;
      color: #ddd;
    }

    .dw-album-meta {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    .dw-player {
      background: linear-gradient(145deg, #111, #050505);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      padding: 22px;
    }

    .dw-player-top {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 24px;
    }

    .dw-cover-large {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      background: linear-gradient(145deg,#111,#1a1a1a);
    }

    .dw-now-title {
      font-size: 22px;
      font-weight: 400;
      color: #f2f2f2;
      margin-bottom: 6px;
    }

    .dw-now-album {
      font-size: 11px;
      color: #777;
      margin-bottom: 12px;
    }

    .dw-album-notes {
      font-size: 11px;
      line-height: 1.7;
      color: #999;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.04);
      margin-bottom: 18px;
    }

    .dw-controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .dw-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 10px;
      cursor: pointer;
      background: rgba(255,255,255,.08);
      color: #ddd;
      text-transform: lowercase;
      transition: background .18s ease, transform .18s ease;
    }

    .dw-btn:hover {
      background: rgba(255,255,255,.13);
      transform: translateY(-1px);
    }

    .dw-tracks {
      margin-top: 16px;
    }

    .dw-track {
      display: grid;
      grid-template-columns: 30px 1fr 54px;
      gap: 10px;
      align-items: center;
      padding: 13px 11px;
      border-radius: 10px;
      border-bottom: 1px solid rgba(255,255,255,.03);
      cursor: pointer;
      transition: background .18s ease;
    }

    .dw-track:hover {
      background: rgba(255,255,255,.04);
    }

    .dw-track.active {
      background: rgba(255,255,255,.09);
    }

    .dw-track-number {
      font-size: 10px;
      color: #666;
    }

    .dw-track-title {
      font-size: 12px;
      color: #b8b8b8;
    }

    .dw-track.active .dw-track-title {
      color: #f2f2f2;
    }

    .dw-track-duration {
      font-size: 10px;
      color: #666;
      text-align: right;
    }

    .dw-floating {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      background: rgba(8,8,8,.86);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      align-items: center;
      z-index: 9999;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .dw-floating img {
      width: 42px;
      height: 42px;
      object-fit: cover;
      border-radius: 6px;
      background: #111;
    }

    .dw-float-title {
      font-size: 11px;
      color: #ddd;
      margin-bottom: 2px;
    }

    .dw-float-album {
      font-size: 9px;
      color: #666;
      margin-bottom: 8px;
    }

    .dw-transport {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      gap: 8px;
      align-items: center;
    }

    .dw-progress-wrap {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      gap: 8px;
      align-items: center;
    }

    .dw-time {
      font-size: 9px;
      color: #666;
      text-align: center;
    }

    .dw-range {
      width: 100%;
      accent-color: #ddd;
      cursor: pointer;
    }

    .dw-volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .dw-volume-label {
      font-size: 9px;
      color: #666;
      width: 24px;
    }

    .dw-waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      margin-top: 8px;
      opacity: .75;
    }

    .dw-waveform span {
      width: 3px;
      height: 10px;
      background: rgba(255,255,255,.35);
      border-radius: 999px;
      transform-origin: bottom;
    }

    .dw-waveform span:nth-child(2n) { height: 18px; }
    .dw-waveform span:nth-child(3n) { height: 7px; }
    .dw-waveform span:nth-child(5n) { height: 22px; }

    .dw-waveform.playing span {
      animation: dwPulse .9s infinite ease-in-out;
    }

    .dw-waveform.playing span:nth-child(2n) {
      animation-delay: .08s;
    }

    .dw-waveform.playing span:nth-child(3n) {
      animation-delay: .16s;
    }

    @keyframes dwPulse {
      0%, 100% { transform: scaleY(.65); opacity: .45; }
      50% { transform: scaleY(1.25); opacity: .95; }
    }

    .dw-float-notes {
      font-size: 9px;
      line-height: 1.5;
      color: #777;
      max-height: 34px;
      overflow: hidden;
      margin-top: 6px;
    }

    audio {
      display: none;
    }

    @media (max-width: 850px) {
      #dw-app {
        padding: 16px;
        padding-bottom: 220px;
      }

      .dw-layout {
        grid-template-columns: 1fr;
      }

      .dw-player-top {
        grid-template-columns: 1fr;
      }

      .dw-cover-large {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }

      .dw-floating {
        grid-template-columns: 38px 1fr;
      }

      .dw-floating > .dw-floating-buttons {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>

<div id="dw-app"></div>

<script>
  const albums = [
    {
      title: "discussions for bass and drums volume 5",
      year: "2026",
      cover: "",
      tags: "bass drums xylophone icelandic metal instrumental",
      notes:
        "a variation on the discussions series, this one took a while, maybe 5-6 months?<br><br>xylophone as it's a favorite metal instrument, brings the icelandic vibes as well.",
      tracks: [
        {
          title: "track one",
          duration: "3:42",
          audio: ""
        },
        {
          title: "track two",
          duration: "4:11",
          audio: ""
        }
      ]
    },
    {
      title: "album 2",
      year: "2025",
      cover: "",
      tags: "composition recording selected works",
      notes:
        "album notes go here.<br><br>add recording details, personnel, concept, credits, production notes, or anything you want listeners to know.",
      tracks: [
        {
          title: "track one",
          duration: "3:08",
          audio: ""
        },
        {
          title: "track two",
          duration: "4:27",
          audio: ""
        }
      ]
    }
  ];

  let currentAlbum = 0;
  let currentTrack = 0;
  let playing = false;
  let searchTerm = "";

  const app = document.getElementById("dw-app");

  app.innerHTML = `
    <div class="dw-title">drew waters music</div>

    <div class="dw-subtitle">
      albums, compositions, recordings, and selected works.
    </div>

    <input
      class="dw-search"
      id="searchInput"
      type="search"
      placeholder="search albums, tracks, notes, tags..."
    >

    <div class="dw-layout">
      <div class="dw-album-list" id="albumList"></div>

      <div class="dw-player">
        <div class="dw-player-top">
          <img class="dw-cover-large" id="coverLarge" loading="lazy">

          <div>
            <div class="dw-now-title" id="nowTitle"></div>
            <div class="dw-now-album" id="nowAlbum"></div>
            <div class="dw-album-notes" id="albumNotes"></div>

            <div class="dw-controls">
              <button class="dw-btn" onclick="previousTrack()">prev</button>
              <button class="dw-btn" id="playBtn" onclick="togglePlay()">play</button>
              <button class="dw-btn" onclick="nextTrack()">next</button>
            </div>
          </div>
        </div>

        <div class="dw-tracks" id="trackList"></div>
      </div>
    </div>

    <div class="dw-floating">
      <img id="floatCover" loading="lazy">

      <div>
        <div class="dw-float-title" id="floatTitle"></div>
        <div class="dw-float-album" id="floatAlbum"></div>

        <div class="dw-progress-wrap">
          <span class="dw-time" id="currentTime">0:00</span>
          <input class="dw-range" id="seekBar" type="range" min="0" max="100" value="0">
          <span class="dw-time" id="durationTime">0:00</span>
        </div>

        <div class="dw-waveform" id="waveform">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="dw-volume-wrap">
          <span class="dw-volume-label">vol</span>
          <input class="dw-range" id="volumeBar" type="range" min="0" max="1" step="0.01" value="0.8">
        </div>

        <div class="dw-float-notes" id="floatNotes"></div>
      </div>

      <div class="dw-floating-buttons">
        <button class="dw-btn" onclick="previousTrack()">prev</button>
        <button class="dw-btn" id="floatBtn" onclick="togglePlay()">play</button>
        <button class="dw-btn" onclick="nextTrack()">next</button>
      </div>
    </div>

    <audio id="audio" preload="none"></audio>
  `;

  const audio = document.getElementById("audio");
  const seekBar = document.getElementById("seekBar");
  const volumeBar = document.getElementById("volumeBar");
  const currentTimeEl = document.getElementById("currentTime");
  const durationTimeEl = document.getElementById("durationTime");
  const waveform = document.getElementById("waveform");
  const searchInput = document.getElementById("searchInput");

  audio.volume = Number(volumeBar.value);

  function getFilteredAlbums() {
    if (!searchTerm.trim()) {
      return albums.map((album, index) => ({ album, index }));
    }

    const q = searchTerm.toLowerCase();

    return albums
      .map((album, index) => ({ album, index }))
      .filter(({ album }) => {
        const trackText = album.tracks.map(track => track.title).join(" ");
        const searchable = `
          ${album.title}
          ${album.year}
          ${album.notes}
          ${album.tags || ""}
          ${trackText}
        `.toLowerCase();

        return searchable.includes(q);
      });
  }

  function renderAlbums() {
    const filtered = getFilteredAlbums();

    if (!filtered.length) {
      document.getElementById("albumList").innerHTML =
        `<div class="dw-album-meta">no matching albums.</div>`;
      return;
    }

    document.getElementById("albumList").innerHTML =
      filtered.map(({ album, index }) => `
        <div
          class="dw-album-card ${index === currentAlbum ? "active" : ""}"
          onclick="selectAlbum(${index})"
        >
          ${
            album.cover
              ? `<img src="${album.cover}" loading="lazy" alt="${album.title} cover">`
              : `<div class="dw-cover-placeholder"></div>`
          }

          <div>
            <div class="dw-album-title">${album.title}</div>
            <div class="dw-album-meta">
              ${album.year} · ${album.tracks.length} tracks
            </div>
          </div>
        </div>
      `).join("");
  }

  function renderPlayer() {
    const album = albums[currentAlbum];
    const track = album.tracks[currentTrack];

    document.getElementById("coverLarge").src = album.cover || "";
    document.getElementById("coverLarge").alt = album.title + " cover";

    document.getElementById("nowTitle").innerText = track.title;

    document.getElementById("nowAlbum").innerText =
      album.title + " · " + album.year;

    document.getElementById("albumNotes").innerHTML = album.notes;

    document.getElementById("floatCover").src = album.cover || "";
    document.getElementById("floatCover").alt = album.title + " cover";

    document.getElementById("floatTitle").innerText = track.title;
    document.getElementById("floatAlbum").innerText = album.title;
    document.getElementById("floatNotes").innerHTML = album.notes;

    document.getElementById("playBtn").innerText = playing ? "pause" : "play";
    document.getElementById("floatBtn").innerText = playing ? "pause" : "play";

    waveform.classList.toggle("playing", playing);

    document.getElementById("trackList").innerHTML =
      album.tracks.map((track, index) => `
        <div
          class="dw-track ${index === currentTrack ? "active" : ""}"
          onclick="playTrack(${index})"
        >
          <div class="dw-track-number">${index + 1}</div>
          <div class="dw-track-title">${track.title}</div>
          <div class="dw-track-duration">${track.duration || ""}</div>
        </div>
      `).join("");
  }

  function selectAlbum(index) {
    currentAlbum = index;
    currentTrack = 0;
    playing = false;

    audio.pause();

    const track = albums[currentAlbum].tracks[currentTrack];
    audio.src = track.audio || "";

    resetProgress();
    renderAlbums();
    renderPlayer();
  }

  function playTrack(index) {
    currentTrack = index;

    const track = albums[currentAlbum].tracks[currentTrack];

    if (!track || !track.audio) {
      playing = false;
      resetProgress();
      renderPlayer();
      return;
    }

    audio.src = track.audio;
    audio.play();

    playing = true;

    renderAlbums();
    renderPlayer();
  }

  function togglePlay() {
    const track = albums[currentAlbum].tracks[currentTrack];

    if (!track || !track.audio) {
      playing = false;
      renderPlayer();
      return;
    }

    if (!audio.src) {
      audio.src = track.audio;
    }

    if (playing) {
      audio.pause();
      playing = false;
    } else {
      audio.play();
      playing = true;
    }

    renderPlayer();
  }

  function nextTrack() {
    const album = albums[currentAlbum];

    if (currentTrack < album.tracks.length - 1) {
      currentTrack++;
    } else {
      currentTrack = 0;
    }

    playTrack(currentTrack);
  }

  function previousTrack() {
    const album = albums[currentAlbum];

    if (currentTrack > 0) {
      currentTrack--;
    } else {
      currentTrack = album.tracks.length - 1;
    }

    playTrack(currentTrack);
  }

  function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return "0:00";

    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60).toString().padStart(2, "0");

    return `${mins}:${secs}`;
  }

  function updateProgress() {
    if (!audio.duration) return;

    seekBar.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.innerText = formatTime(audio.currentTime);
  }

  function updateDuration() {
    durationTimeEl.innerText = formatTime(audio.duration);
  }

  function resetProgress() {
    seekBar.value = 0;
    currentTimeEl.innerText = "0:00";
    durationTimeEl.innerText = "0:00";
  }

  seekBar.addEventListener("input", () => {
    if (!audio.duration) return;
    audio.currentTime = (seekBar.value / 100) * audio.duration;
  });

  volumeBar.addEventListener("input", () => {
    audio.volume = Number(volumeBar.value);
  });

  audio.addEventListener("timeupdate", updateProgress);
  audio.addEventListener("loadedmetadata", updateDuration);
  audio.addEventListener("ended", nextTrack);

  audio.addEventListener("pause", () => {
    playing = false;
    renderPlayer();
  });

  audio.addEventListener("play", () => {
    playing = true;
    renderPlayer();
  });

  searchInput.addEventListener("input", event => {
    searchTerm = event.target.value;
    renderAlbums();
  });

  document.addEventListener("keydown", event => {
    const activeTag = document.activeElement.tagName.toLowerCase();

    if (activeTag === "input" && document.activeElement !== seekBar && document.activeElement !== volumeBar) {
      return;
    }

    if (event.code === "Space") {
      event.preventDefault();
      togglePlay();
    }

    if (event.code === "ArrowRight") {
      nextTrack();
    }

    if (event.code === "ArrowLeft") {
      previousTrack();
    }

    if (event.code === "ArrowUp") {
      event.preventDefault();
      audio.volume = Math.min(1, audio.volume + 0.05);
      volumeBar.value = audio.volume;
    }

    if (event.code === "ArrowDown") {
      event.preventDefault();
      audio.volume = Math.max(0, audio.volume - 0.05);
      volumeBar.value = audio.volume;
    }
  });

  renderAlbums();
  renderPlayer();
</script>

</body>
</html>
