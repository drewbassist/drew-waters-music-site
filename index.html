<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Drew Waters Music</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      text-transform: lowercase;
    }

    #dw-app {
      min-height: 100vh;
      width: 100vw;
      padding: 22px;
      box-sizing: border-box;
    }

    .dw-header {
      position: sticky;
      top: 0;
      z-index: 9999;
      background: #ffffff;
      padding-bottom: 18px;
      margin-bottom: 18px;
    }

    .dw-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
      color: #000000;
      letter-spacing: 0.02em;
    }

    .dw-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 24px;
      width: 100%;
      align-items: start;
    }

    .dw-album-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;

      position: sticky;
      top: 88px;
      align-self: start;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      padding-right: 6px;
    }

    .dw-album-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      background: #f6f6f6;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease, border-color .18s ease;
    }

    .dw-album-card:hover {
      transform: translateY(-1px);
      background: #f0f0f0;
      border-color: #cccccc;
    }

    .dw-album-card.active {
      background: #ececec;
      border-color: #bbbbbb;
    }

    .dw-album-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 8px;
      background: #dddddd;
      display: block;
    }

    .dw-cover-placeholder {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      background: linear-gradient(145deg,#f0f0f0,#dcdcdc);
    }

    .dw-album-title {
      font-size: 12px;
      font-weight: 400;
      color: #111111;
      overflow-wrap: break-word;
    }

    .dw-album-meta {
      font-size: 10px;
      color: #777777;
      margin-top: 4px;
      font-weight: 400;
    }

    .dw-player {
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 18px;
      padding: 22px;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .dw-player-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
      align-items: start;
      margin-bottom: 24px;
      width: 100%;
    }

    .dw-player-top.has-cover {
      grid-template-columns: 170px minmax(0, 1fr);
    }

    .dw-cover-large {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      background: #e8e8e8;
      display: block;
      border: none;
      outline: none;
      cursor: zoom-in;
      transition: transform .18s ease, opacity .18s ease;
    }

    .dw-cover-large:hover {
      transform: scale(1.015);
      opacity: .92;
    }

    .dw-now-title {
      font-size: 22px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
      overflow-wrap: break-word;
    }

    .dw-now-album {
      font-size: 11px;
      color: #666666;
      margin-bottom: 12px;
    }

    .dw-album-notes {
      width: 100%;
      box-sizing: border-box;
      font-size: 11px;
      line-height: 1.55;
      color: #444444;
      padding: 18px 20px;
      border-radius: 12px;
      background: #f3f3f3;
      border: 1px solid #e2e2e2;
      margin-bottom: 18px;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .dw-tracks {
      margin-top: 16px;
    }

    .dw-track {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: center;
      padding: 13px 11px;
      border-radius: 10px;
      border-bottom: 1px solid #e9e9e9;
    }

    .dw-track:hover {
      background: #f5f5f5;
    }

    .dw-track-number {
      font-size: 10px;
      color: #888888;
    }

    .dw-track-title {
      font-size: 12px;
      color: #111111;
      overflow-wrap: break-word;
    }

    .dw-track audio {
      width: 100%;
      height: 32px;
      opacity: .85;
    }

    .dw-track audio::-webkit-media-controls-playback-rate-button {
      display: none;
    }

    .dw-track audio::-webkit-media-controls-timeline {
      min-width: 120px;
    }

    .dw-no-audio {
      font-size: 10px;
      color: #999999;
      text-align: right;
    }

    .dw-credits {
      margin-top: 18px;
      padding-top: 22px;
      border-top: none;
      font-size: 11px;
      line-height: 1.8;
      color: #444444;
    }

    .dw-credits-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #000000;
    }

    .dw-credit-line {
      margin-bottom: 4px;
    }

    .dw-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 99999;
      align-items: center;
      justify-content: center;
      padding: 32px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .dw-lightbox img {
      max-width: 94vw;
      max-height: 94vh;
      border-radius: 16px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      cursor: zoom-out;
    }

    @media (max-width: 850px) {
      #dw-app {
        padding: 16px;
      }

      .dw-layout {
        grid-template-columns: 1fr;
      }

      .dw-album-list {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .dw-player-top,
      .dw-player-top.has-cover {
        grid-template-columns: 1fr;
      }

      .dw-cover-large {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }

      .dw-track {
        grid-template-columns: 24px 1fr;
      }

      .dw-track audio,
      .dw-no-audio {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>

<div id="dw-app"></div>

<div id="lightbox" class="dw-lightbox" onclick="closeLightbox()">
  <img id="lightboxImage" onclick="event.stopPropagation()">
</div>

<script>

  app.innerHTML = `
    <div class="dw-header">
      <div class="dw-title">drew waters music</div>
    </div>

    <div class="dw-layout">
      <div class="dw-album-list" id="albumList"></div>

      <div class="dw-player">

          <div>

        <div class="dw-tracks" id="trackList"></div>

      </div>
    </div>
  `;
</script>

</body>
</html>
