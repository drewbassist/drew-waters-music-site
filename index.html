<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Drew Waters Music</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      text-transform: lowercase;
    }

    #dw-app {
      min-height: 100vh;
      width: 100vw;
      padding: 22px;
      box-sizing: border-box;
    }

    .dw-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
      color: #000000;
      letter-spacing: 0.02em;
    }

    .dw-subtitle {
      color: #666666;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .dw-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    .dw-album-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dw-album-card {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      background: #f6f6f6;
      border: 1px solid #e5e5e5;
      cursor: pointer;

      transition:
        background .18s ease,
        transform .18s ease,
        border-color .18s ease;
    }

    .dw-album-card:hover {
      transform: translateY(-1px);
      background: #f0f0f0;
      border-color: #cccccc;
    }

    .dw-album-card.active {
      background: #ececec;
      border-color: #bbbbbb;
    }

    .dw-album-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 8px;
      background: #dddddd;
      display: block;
    }

    .dw-cover-placeholder {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      background: linear-gradient(145deg,#f0f0f0,#dcdcdc);
    }

    .dw-album-title {
      font-size: 12px;
      font-weight: 400;
      color: #111111;
    }

    .dw-album-meta {
      font-size: 10px;
      color: #777777;
      margin-top: 4px;
      font-weight: 400;
    }

    .dw-player {
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 18px;
      padding: 22px;
    }

    .dw-player-top {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 24px;
    }

    .dw-cover-large {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      background: #e8e8e8;

      display: block;
      border: none;
      outline: none;
    }

    .dw-now-title {
      font-size: 22px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }

    .dw-now-album {
      font-size: 11px;
      color: #666666;
      margin-bottom: 12px;
    }

    .dw-album-notes {
      font-size: 11px;
      line-height: 1.7;
      color: #444444;
      padding: 12px;
      border-radius: 10px;
      background: #f3f3f3;
      border: 1px solid #e2e2e2;
      margin-bottom: 18px;
    }

    .dw-tracks {
      margin-top: 16px;
    }

    .dw-track {
      display: grid;
      grid-template-columns: 30px 1fr 70px 280px;
      gap: 12px;
      align-items: center;
      padding: 13px 11px;
      border-radius: 10px;
      border-bottom: 1px solid #e9e9e9;
    }

    .dw-track:hover {
      background: #f5f5f5;
    }

    .dw-track-number {
      font-size: 10px;
      color: #888888;
    }

    .dw-track-title {
      font-size: 12px;
      color: #111111;
    }

    .dw-track-duration {
      font-size: 10px;
      color: #777777;
      text-align: right;
    }

    .dw-track audio {
      width: 100%;
      height: 32px;
      opacity: .85;
    }

    .dw-no-audio {
      font-size: 10px;
      color: #999999;
      text-align: right;
    }

    @media (max-width: 850px) {
      #dw-app {
        padding: 16px;
      }

      .dw-layout {
        grid-template-columns: 1fr;
      }

      .dw-player-top {
        grid-template-columns: 1fr;
      }

      .dw-cover-large {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }

      .dw-track {
        grid-template-columns: 24px 1fr 48px;
      }

      .dw-track audio,
      .dw-no-audio {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>

<div id="dw-app"></div>

<script>
  const albums = [
    {
  title: "discussions for bass and drums volume 5",
  year: "2026",
  cover: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_images/new+vol5.png",
  notes:
    "a variation on the discussions series, this one took a while, maybe 5-6 months?<br>xylophone as it's a favorite metal instrument, brings the icelandic vibes as well.",
  tracks: [
    {
      title: "they call me and i go",
      duration: "4:12",
      audio: ""
    },
    {
      title: "it is a frozen road",
      duration: "5:01",
      audio: ""
    },
    {
      title: "past midnight, a dust",
      duration: "3:48",
      audio: ""
    },
    {
      title: "of snow caught",
      duration: "6:14",
      audio: ""
    },
    {
      title: "in the rigid wheeltracks",
      duration: "7:03",
      audio: ""
    }
  ]
}
  ];

  let currentAlbum = 0;

  const app = document.getElementById("dw-app");

  app.innerHTML = `
    <div class="dw-title">drew waters music</div>

    <br>
    <br>

    <div class="dw-subtitle"></div>

    <div class="dw-layout">

      <div class="dw-album-list" id="albumList"></div>

      <div class="dw-player">

        <div class="dw-player-top">

          <img class="dw-cover-large" id="coverLarge">

          <div>
            <div class="dw-now-title" id="nowTitle"></div>

            <div class="dw-now-album" id="nowAlbum"></div>

            <div class="dw-album-notes" id="albumNotes"></div>
          </div>

        </div>

        <div class="dw-tracks" id="trackList"></div>

      </div>

    </div>
  `;

  function renderAlbums() {
    document.getElementById("albumList").innerHTML =
      albums.map((album, index) => `
        <div
          class="dw-album-card ${index === currentAlbum ? "active" : ""}"
          onclick="selectAlbum(${index})"
        >

          ${
            album.cover
              ? `<img src="${album.cover}" alt="${album.title} cover">`
              : `<div class="dw-cover-placeholder"></div>`
          }

          <div>
            <div class="dw-album-title">${album.title}</div>

            <div class="dw-album-meta">
              ${album.year} · ${album.tracks.length} tracks
            </div>
          </div>

        </div>
      `).join("");
  }

  function renderPlayer() {
    const album = albums[currentAlbum];

    const coverLarge = document.getElementById("coverLarge");

    if (album.cover) {
      coverLarge.src = album.cover;
      coverLarge.style.display = "block";
    } else {
      coverLarge.removeAttribute("src");
      coverLarge.style.display = "none";
    }

    document.getElementById("nowTitle").innerText = album.title;

    document.getElementById("nowAlbum").innerText = album.year;

    document.getElementById("albumNotes").innerHTML = album.notes;

    document.getElementById("trackList").innerHTML =
      album.tracks.map((track, index) => `
        <div class="dw-track">

          <div class="dw-track-number">${index + 1}</div>

          <div class="dw-track-title">${track.title}</div>

          <div class="dw-track-duration">
            ${track.duration || ""}
          </div>

          ${
            track.audio
              ? `<audio controls preload="none" src="${track.audio}"></audio>`
              : `<div class="dw-no-audio">audio coming soon</div>`
          }

        </div>
      `).join("");
  }

  function selectAlbum(index) {
    currentAlbum = index;

    renderAlbums();
    renderPlayer();
  }

  renderAlbums();
  renderPlayer();
</script>

</body>
</html>
