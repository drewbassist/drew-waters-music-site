<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Drew Waters Music</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      text-transform: lowercase;
    }

    #dw-app {
      min-height: 100vh;
      width: 100vw;
      padding: 22px;
      box-sizing: border-box;
    }

    .dw-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
      color: #000000;
      letter-spacing: 0.02em;
    }

    .dw-subtitle {
      color: #666666;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .dw-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 24px;
      width: 100%;
    }

    .dw-album-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .dw-album-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      background: #f6f6f6;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      transition: background .18s ease, transform .18s ease, border-color .18s ease;
    }

    .dw-album-card:hover {
      transform: translateY(-1px);
      background: #f0f0f0;
      border-color: #cccccc;
    }

    .dw-album-card.active {
      background: #ececec;
      border-color: #bbbbbb;
    }

    .dw-album-card img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 8px;
      background: #dddddd;
      display: block;
    }

    .dw-cover-placeholder {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      background: linear-gradient(145deg,#f0f0f0,#dcdcdc);
    }

    .dw-album-title {
      font-size: 12px;
      font-weight: 400;
      color: #111111;
      overflow-wrap: break-word;
    }

    .dw-album-meta {
      font-size: 10px;
      color: #777777;
      margin-top: 4px;
      font-weight: 400;
    }

    .dw-player {
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 18px;
      padding: 22px;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .dw-player-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
      align-items: start;
      margin-bottom: 24px;
      width: 100%;
    }

    .dw-player-top.has-cover {
      grid-template-columns: 170px minmax(0, 1fr);
    }

    .dw-cover-large {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      background: #e8e8e8;
      display: block;
      border: none;
      outline: none;
      cursor: zoom-in;
      transition: transform .18s ease, opacity .18s ease;
    }

    .dw-cover-large:hover {
      transform: scale(1.015);
      opacity: .92;
    }

    .dw-now-title {
      font-size: 22px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
      overflow-wrap: break-word;
    }

    .dw-now-album {
      font-size: 11px;
      color: #666666;
      margin-bottom: 12px;
    }

    .dw-album-notes {
      width: 100%;
      box-sizing: border-box;
      font-size: 11px;
      line-height: 1.55;
      color: #444444;
      padding: 18px 20px;
      border-radius: 12px;
      background: #f3f3f3;
      border: 1px solid #e2e2e2;
      margin-bottom: 18px;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .dw-tracks {
      margin-top: 16px;
    }

    .dw-track {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: center;
      padding: 13px 11px;
      border-radius: 10px;
      border-bottom: 1px solid #e9e9e9;
    }

    .dw-track:hover {
      background: #f5f5f5;
    }

    .dw-track-number {
      font-size: 10px;
      color: #888888;
    }

    .dw-track-title {
      font-size: 12px;
      color: #111111;
      overflow-wrap: break-word;
    }

    .dw-track audio {
      width: 100%;
      height: 32px;
      opacity: .85;
    }

    .dw-track audio::-webkit-media-controls-playback-rate-button {
      display: none;
    }

    .dw-track audio::-webkit-media-controls-timeline {
      min-width: 120px;
    }

    .dw-no-audio {
      font-size: 10px;
      color: #999999;
      text-align: right;
    }

    .dw-credits {
      margin-top: 18px;
      padding-top: 22px;
      border-top: none;
      font-size: 11px;
      line-height: 1.8;
      color: #444444;
    }

    .dw-credits-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #000000;
    }

    .dw-credit-line {
      margin-bottom: 4px;
    }

    .dw-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 99999;
      align-items: center;
      justify-content: center;
      padding: 32px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .dw-lightbox img {
      max-width: 94vw;
      max-height: 94vh;
      border-radius: 16px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      cursor: zoom-out;
    }

    @media (max-width: 850px) {
      #dw-app {
        padding: 16px;
      }

      .dw-layout {
        grid-template-columns: 1fr;
      }

      .dw-player-top,
      .dw-player-top.has-cover {
        grid-template-columns: 1fr;
      }

      .dw-cover-large {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }

      .dw-track {
        grid-template-columns: 24px 1fr;
      }

      .dw-track audio,
      .dw-no-audio {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>

<div id="dw-app"></div>

<div id="lightbox" class="dw-lightbox" onclick="closeLightbox()">
  <img id="lightboxImage" onclick="event.stopPropagation()">
</div>

<script>
  const albums = [
    {
      title: "discussions for bass and drums volume 5",
      year: "2026",
      cover: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_images/discussions_for_bass_and_drums_volume_5.png",
      notes:
        "a variation on the discussions series, this one took a while, maybe 5-6 months?<br>glockenspeil as it is the most metal of instruments, and it brings the icelandic vibes as well.",
      credits: `
        <div class="dw-credits-title">credits</div>
        <div class="dw-credit-line">drew waters · guitar, glockenspeil, recording, production</div>
        <div class="dw-credit-line">matt aiken · drums, recording</div>
        <div class="dw-credit-line">recorded in california and new york, 10 april 2026</div>
      `,
      tracks: [
        {
          title: "they call me and i go",
          audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/discussions+for+bass+and+drums+volume+5/aiken_Waters_redo_01_v2.wav"
        },
        {
          title: "it is a frozen road",
          audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/discussions+for+bass+and+drums+volume+5/aiken_waters_redo_002_v4.wav"
        },
        {
          title: "past midnight, a dust",
          audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/discussions+for+bass+and+drums+volume+5/aiken_waters_redo_003_v2.wav"
        },
        {
          title: "of snow caught",
          audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/discussions+for+bass+and+drums+volume+5/aiken_waters_redo_004_v2.wav"
        },
        {
          title: "in the rigid wheeltracks",
          audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/discussions+for+bass+and+drums+volume+5/aiken_waters_redo_005_v3.wav"
        }
      ]
    },
    {
      title: "the lost tapes",
      year: "2008",
      cover: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_images/shotwell_waters.png",
      notes: `
found this a couple of days ago going through my gear space. i'm not sure why i didn't publish this. at the time, 18 years ago now, the only format was cd, possibly a dedicated website, maybe that's why? these tracks were contained on an old alesis masterlink, like the only cool piece of gear they ever made.
<br>
blew my mind in a couple of ways in that i continue to do bass/drum duets and this was the first.
<br>
the arrangements are bolder than i expected. the composed sections, soloing, transcribing the solo then composing a harmonization, were a little startling. it really inspires me to do more of this.
<br>
i was mixing out of the box for the first time, had no clue what i was doing really. just a digi003 through a folcrom passive mixer, printing to the masterlink, in a space in san leandro.
<br>
some originals and favorite standards. especially beatrice. that piece is all magic.
`,
      credits: `
        <div class="dw-credits-title">credits</div>
        <div class="dw-credit-line">drew waters · guitar, recording, production</div>
        <div class="dw-credit-line">joe shotwell · drums</div>
        <div class="dw-credit-line">recorded at sharkbite studios, oakland, 2008</div>
      `,
      tracks: [
        { title: "aliceish", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/aliceish.wav" },
        { title: "stickman's sun", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/stickman_s+sun.wav" },
        { title: "beatrice", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/beatrice.wav" },
        { title: "bluesette", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/bluesette.wav" },
        { title: "all the things you are", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/all+the+things.wav" },
        { title: "stella by starlight", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/stella.wav" },
        { title: "blues for mitch", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/blues+for+mitch.wav" },
        { title: "rhythms, changes", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/the+lost+tapes+2008/rhythms+changes.wav" }
      ]
    },
    {
      title: "humboldt and detroit",
      year: "2026",
      cover: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_images/humbolt_detroit_vol_01.png",
      notes:
        "recording close to the intersection of humboldt and detroit streets, this collection represents a conversation that begins but never quite concludes-  short gestures offered, responses, shaped by some assumptions. this release is the first in an ongoing series of experiments, exploring a prompt, some space, and a quick decision —what can happen when one listens and carefully responds..",
      credits: `
        <div class="dw-credits-title">credits</div>
        <div class="dw-credit-line">drew waters · guitar, recording, production</div>
        <div class="dw-credit-line">caitlin moss · drums, recording</div>
        <div class="dw-credit-line">recorded in los angeles 1 jan 2026 </div>
      `,
      tracks: [
        { title: "since feeling is first", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/humbolt+and+detroit/moss_waters_88_bpm_jan_2026.wav" },
        { title: "who pays any attention", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/humbolt+and+detroit/moss_waters_95_bpm_jan_2026_v4.wav" },
        { title: "to the syntax", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/humbolt+and+detroit/moss_waters_97bpm_jan_2026_v3.wav" },
        { title: "of things", audio: "https://drewprototypes.s3.us-west-1.amazonaws.com/drew-waters-music.com/album_audio/humbolt+and+detroit/moss_waters_jan_16_2026_song_004_v8.wav" }
      ]
    }
  ];

  let currentAlbum = 0;

  const app = document.getElementById("dw-app");

  app.innerHTML = `
    <div class="dw-title">drew waters music</div>

    <br>
    <br>

    <div class="dw-subtitle"></div>

    <div class="dw-layout">
      <div class="dw-album-list" id="albumList"></div>

      <div class="dw-player">
        <div class="dw-player-top" id="playerTop">
          <img
            class="dw-cover-large"
            id="coverLarge"
            onclick="openLightbox()"
          >

          <div>
            <div class="dw-now-title" id="nowTitle"></div>
            <div class="dw-now-album" id="nowAlbum"></div>
            <div class="dw-album-notes" id="albumNotes"></div>
          </div>
        </div>

        <div class="dw-tracks" id="trackList"></div>
        <div class="dw-credits" id="albumCredits"></div>
      </div>
    </div>
  `;

  function pauseOtherAudio(currentAudio) {
    document.querySelectorAll("audio").forEach(audio => {
      if (audio !== currentAudio) {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  }

  function renderAlbums() {
    document.getElementById("albumList").innerHTML =
      albums.map((album, index) => `
        <div
          class="dw-album-card ${index === currentAlbum ? "active" : ""}"
          onclick="selectAlbum(${index})"
        >
          ${
            album.cover
              ? `<img src="${album.cover}" alt="${album.title} cover">`
              : `<div class="dw-cover-placeholder"></div>`
          }

          <div>
            <div class="dw-album-title">${album.title}</div>
            <div class="dw-album-meta">${album.year}</div>
          </div>
        </div>
      `).join("");
  }

  function renderPlayer() {
    const album = albums[currentAlbum];

    const playerTop = document.getElementById("playerTop");
    const coverLarge = document.getElementById("coverLarge");

    if (album.cover) {
      playerTop.classList.add("has-cover");
      coverLarge.src = album.cover;
      coverLarge.style.display = "block";
    } else {
      playerTop.classList.remove("has-cover");
      coverLarge.removeAttribute("src");
      coverLarge.style.display = "none";
    }

    document.getElementById("nowTitle").innerText = album.title;
    document.getElementById("nowAlbum").innerText = album.year;
    document.getElementById("albumNotes").innerHTML = album.notes;

    document.getElementById("trackList").innerHTML =
      album.tracks.map((track, index) => `
        <div class="dw-track">
          <div class="dw-track-number">${index + 1}</div>
          <div class="dw-track-title">${track.title}</div>

          ${
            track.audio
              ? `<audio
                   controls
                   controlsList="nodownload noplaybackrate"
                   preload="metadata"
                   onplay="pauseOtherAudio(this)"
                   src="${track.audio}">
                 </audio>`
              : `<div class="dw-no-audio">audio coming soon</div>`
          }
        </div>
      `).join("");

    document.getElementById("albumCredits").innerHTML =
      album.credits || "";
  }

  function selectAlbum(index) {
    document.querySelectorAll("audio").forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });

    currentAlbum = index;
    renderAlbums();
    renderPlayer();
  }

  function openLightbox() {
    const album = albums[currentAlbum];

    if (!album.cover) return;

    document.getElementById("lightboxImage").src = album.cover;
    document.getElementById("lightbox").style.display = "flex";
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }

  document.addEventListener("keydown", event => {
    if (event.key === "Escape") {
      closeLightbox();
    }
  });

  renderAlbums();
  renderPlayer();
</script>

</body>
</html>
